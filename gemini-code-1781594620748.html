<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doktor AI - CanlńĪ SńĪnaq</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        #status { font-size: 22px; margin-bottom: 20px; color: #38bdf8; text-align: center; font-weight: bold; }
        #startBtn { padding: 20px 40px; font-size: 20px; background: #0ea5e9; border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; }
        
        /* X…ôtalarńĪ g√∂rm…ôk √ľ√ß√ľn x√ľsusi b√∂lm…ô */
        #debugLog { width: 100%; max-width: 400px; margin-top: 30px; padding: 15px; background: #1e293b; border-radius: 8px; border-left: 5px solid #ef4444; font-family: monospace; font-size: 14px; color: #f87171; word-break: break-all; }
    </style>
</head>
<body>

    <div id="status">S√∂hb…ôti BaŇüladńĪn</div>
    <button id="startBtn">Doktor AI il…ô DanńĪŇü</button>
    
    <!-- Telefonda x…ôtanńĪ canlńĪ g√∂rm…ôk √ľ√ß√ľn -->
    <div id="debugLog">Sistem MesajlarńĪ: HazńĪrdńĪr. X…ôtalar burada g√∂r√ľn…ôc…ôk.</div>

    <script>
        // S…ônin OpenAI API a√ßarńĪn
        const OPENAI_API_KEY = "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";
        
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const debugLog = document.getElementById('debugLog');

        function logError(msg) {
            debugLog.innerText = "X∆ŹTA: " + msg;
            console.error(msg);
        }

        function logStatus(msg) {
            debugLog.innerText = "Sistem: " + msg;
        }

        // S…ôs tanńĪma d…ôst…ôyini yoxla
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            logError("Bu brauzer s…ôs tanńĪma funksiyasńĪnńĪ (SpeechRecognition) d…ôst…ôkl…ômir! Z…ôhm…ôt olmasa Chrome il…ô yoxlayńĪn.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'az-AZ'; 
        recognition.continuous = false;

        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            try {
                recognition.start();
                statusText.innerText = "Sizi dinl…ôyir…ôm...";
                logStatus("Mikrofon aktiv edildi. DanńĪŇüńĪn...");
            } catch (e) {
                logError("Mikrofon baŇüladńĪla bilm…ôdi: " + e.message);
            }
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            statusText.innerText = "D√ľŇü√ľn√ľr…ôm...";
            logStatus(`EŇüidil…ôn s√∂z: "${userSpeech}". ńįndi OpenAI-a g√∂nd…ôrilir...`);

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", 
                        messages: [
                            { role: "system", content: "S…ôn qńĪsa cavab ver…ôn arńĪqlama m√ľt…ôx…ôssisis…ôn." },
                            { role: "user", content: userSpeech }
                        ]
                    })
                });

                const data = await response.json();
                
                // ∆Źg…ôr API a√ßarńĪ bloklanńĪbsa, OpenAI x…ôta mesajńĪ qaytaracaq
                if (data.error) {
                    logError(`OpenAI API X…ôtasńĪ: ${data.error.message} (Y…ôqin ki, a√ßar bloklanńĪb)`);
                    return;
                }

                const aiReply = data.choices[0].message.content;
                logStatus("OpenAI-dan cavab g…ôldi. S…ôsli oxunur...");
                speakText(aiReply);

            } catch (error) {
                logError("ńįnternet v…ô ya server bańülantńĪ x…ôtasńĪ: " + error.message);
            }
        };

        function speakText(text) {
            statusText.innerText = "Doktor AI danńĪŇüńĪr...";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'az-AZ'; 

            utterance.onend = () => {
                statusText.innerText = "Sizi yenid…ôn dinl…ôyir…ôm...";
                recognition.start();
            };
            
            utterance.onerror = (e) => {
                logError("S…ôsli oxuma x…ôtasńĪ: " + e.error);
                recognition.start();
            };

            window.speechSynthesis.speak(utterance);
        }

        recognition.onerror = (event) => {
            logError("S…ôs tanńĪma (Mikrofon) x…ôtasńĪ: " + event.error);
            if (event.error === 'not-allowed') {
                logError("Mikrofon icaz…ôsi r…ôdd edilib! SaytńĪn linkinin yanńĪndakńĪ kilid ikonuna basńĪb mikrofonu aktiv edin.");
            }
        };

        recognition.onend = () => {
            logStatus("Dinl…ôm…ô sessiyasńĪ bitdi. ∆Źg…ôr AI danńĪŇümńĪrsa, sistem yeni s…ôs g√∂zl…ôyir.");
        };
    </script>
</body>
</html>
